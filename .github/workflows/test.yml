name: test
on:
  push: { branches: [main] }
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [".", "contrib/otelkit-grpc"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - name: test (race) + coverage gate
        working-directory: ${{ matrix.module }}
        run: |
          go test -race -coverprofile=cover.out ./...
          pct=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "coverage: ${pct}%"
          if [ "$(printf '%.0f' "$pct")" -lt 100 ]; then
            echo "::error::coverage ${pct}% below 100% gate"
            go tool cover -func=cover.out | grep -v '100.0%' || true
            exit 1
          fi
